name: Verify Codebase

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          pip install ruff mypy pytest
          pip install -e .
          pip install types-requests types-chardet

      - name: 🪄 Auto-Fix Linting & Formatting
        run: |
          ruff check --fix src/ tests/
          ruff format src/ tests/

      - name: 🚀 Commit & Push Fixes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🪄 PyOB: Automated Lint & Format Fixes"
          commit_user_name: "pyob-bot"
          commit_user_email: "pyob-bot@users.noreply.github.com"
          # THIS IS THE KEY: You must pass the secret token here, 
          # otherwise it defaults to the limited GITHUB_TOKEN
          commit_options: '--no-verify'
          push_options: '--force'
        env:
          # This tells the action to use your bot's identity token
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}

      - name: Run PyOB Validation Suite
        run: |
          chmod +x check.sh
          ./check.sh
