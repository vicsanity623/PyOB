name: PyOB Autonomous Service

concurrency:
  group: pyob-singleton
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  workflow_dispatch:     # Allows manual trigger from your phone

jobs:
  evolve:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyOB
        run: |
          pip install -e .
          pip install ruff mypy pytest types-requests types-chardet

      - name: Run PyOB Service
        env:
          PYOB_GEMINI_KEYS: ${{ secrets.PYOB_GEMINI_KEYS }}
          GITHUB_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
        run: |
          # 1. Establish the Bot's Identity
          git config --global user.email "pyob-bot@users.noreply.github.com"
          git config --global user.name "pyob-bot"

          # 2. Start the SSH Tunnel (Standard Pinggy Method)
          # This captures the log to a file so we can find the link later
          ssh -o StrictHostKeyChecking=no -R 80:localhost:5000 a.pinggy.io "printf 'keepalive'" > tunnel.log 2>&1 &
          
          # 3. Give the tunnel a few seconds to wake up
          sleep 5
          
          # 4. Print the Live URL to the GitHub logs
          echo "=================================================="
          echo "🚀 LIVE ARCHITECT HUD URL:"
          grep -o 'https://[^ ]*\.pinggy.link' tunnel.log || echo "HUD Link is being generated... check logs in a moment."
          echo "=================================================="

          # 5. Launch the Evolution Engine
          pyob . --iterations 2
