name: PyOB Autonomous Service

concurrency:
  group: pyob-singleton
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  workflow_dispatch:     # Allows manual trigger from your phone

jobs:
  evolve:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyOB
        run: |
          pip install -e .
          pip install ruff mypy pytest types-requests types-chardet

      - name: Run PyOB Service
        env:
          PYOB_GEMINI_KEYS: ${{ secrets.PYOB_GEMINI_KEYS }}
          GITHUB_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
        shell: bash
        run: |
          # 1. Identity
          git config --global user.email "pyob-bot@users.noreply.github.com"
          git config --global user.name "pyob-bot"

          # 2. Simplified HUD Tunnel (guaranteed to print the link)
          echo "🔗 Starting Observer Dashboard tunnel..."
          curl -s https://pinggy.io/s | sh -s -- -p 5000 -R0 &
          sleep 8                      # Give Pinggy time to connect and print the URL
          disown                       # Keeps tunnel alive even if shell does weird stuff

          echo ""
          echo "=================================================="
          echo "🚀 Observer Dashboard Tunnel"
          echo "   👀 Look for the https://*.pinggy.io link in the lines ABOVE this"
          echo "=================================================="
          echo ""

          # 3. Launch
          pyob . --iterations 5
