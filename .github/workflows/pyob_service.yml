name: PyOB Autonomous Service

concurrency:
  group: pyob-singleton
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  evolve:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyOB
        run: |
          pip install -e .
          pip install ruff mypy pytest types-requests types-chardet

      - name: Run PyOB Service
        env:
          PYOB_GEMINI_KEYS: ${{ secrets.PYOB_GEMINI_KEYS }}
          # This maps your secret to the variable the Python code expects
          GITHUB_TOKEN: ${{ secrets.AI_MODELS_TOKEN }} 
          # The GitHub CLI will automatically use this if it's named GH_TOKEN
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
        run: |
          git config --global user.email "pyob-bot@users.noreply.github.com"
          git config --global user.name "pyob-bot"
          
          # 1. Start the SSH Tunnel
          ssh -o StrictHostKeyChecking=no -R 80:localhost:5000 a.pinggy.io "printf 'keepalive'" > tunnel.log 2>&1 &
          sleep 10
          
          # 2. Launch the bot
          pyob . --iterations 2
          echo "=================================================="
          echo "🚀 LIVE HUD TUNNEL (CURRENT RUN):"
          cat tunnel.log | grep -o 'https://[^ ]*\.pinggy.link' || echo "Link generating... check again in 30s"
          echo "=================================================="
          
      - name: Deploy Permanent HUD to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . # The folder where index.html is
          branch: gh-pages # The branch for GitHub Pages
          commit-message: "📊 Update Architect HUD [skip ci]"
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
