name: PyOB Autonomous Service

concurrency:
  group: pyob-singleton
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  evolve:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyOB and Dependencies
        run: |
          pip install -e .
          pip install ruff mypy pytest types-requests types-chardet ollama

      - name: Start Ollama Engine
        run: |
          # 1. Install without trying to use systemd
          curl -fsSL https://ollama.com/install.sh | sh
          
          # 2. Start the server in the background, ignoring systemd
          # We capture the PID to ensure we can kill it later if needed
          export OLLAMA_HOST=127.0.0.1:11434
          ollama serve > ollama.log 2>&1 &
          
          # 3. Wait for the port to actually open
          echo "Waiting for Ollama to start..."
          until curl -s http://127.0.0.1:11434; do
            echo "Waiting..."
            sleep 2
          done
          
          # 4. Pull the model now that the server is verified up
          ollama pull qwen2.5-coder:7b
          echo "OLLAMA_AVAILABLE=True" >> $GITHUB_ENV

      - name: Run PyOB Service
        env:
          PYOB_GEMINI_KEYS: ${{ secrets.PYOB_GEMINI_KEYS }}
          GITHUB_TOKEN: ${{ secrets.AI_MODELS_TOKEN }} 
          GH_TOKEN: ${{ secrets.BOT_GITHUB_TOKEN }}
          # This variable will now be picked up by your models.py logic
          OLLAMA_AVAILABLE: "True"
        run: |
          git config --global user.email "pyob-bot@users.noreply.github.com"
          git config --global user.name "pyob-bot"
          
          # 1. Start the SSH Tunnel
          ssh -o StrictHostKeyChecking=no -R 80:localhost:5000 a.pinggy.io "printf 'keepalive'" > tunnel.log 2>&1 &
          sleep 10
          
          # 2. Launch the bot
          pyob . --iterations 2
          
      - name: Deploy Permanent HUD to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: gh-pages
          commit-message: "📊 Update Architect HUD [skip ci]"
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
